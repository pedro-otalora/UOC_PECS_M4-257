<picture>
  <source
    media="(min-width: 768px)"
    type="image/webp"
    srcset="
      ./img/{{srcDesktop}}?as=webp&width=1120 1120w,
      ./img/{{srcDesktop}}?as=webp&width=2240 2240w
    "
    sizes="(min-width: 1200px) 1120px, 90vw"
  />

  <source
    type="image/webp"
    srcset="
      ./img/{{srcMobile}}?as=webp&width=600   600w,
      ./img/{{srcMobile}}?as=webp&width=1200 1200w,
      ./img/{{srcMobile}}?as=webp&width=1800 1800w
    "
    sizes="100vw"
  />

  <source
    media="(max-width: 767px)"
    type="image/jpeg"
    srcset="./img/{{srcMobile}}?width=600 600w"
    sizes="100vw"
  />

  <img
    src="./img/{{srcDesktop}}?width=1120"
    alt="{{alt}}"
    lang="{{lang}}"
    class="{{class}}"
    loading="eager"
    width="1120"
    height="400"
  />
</picture>
