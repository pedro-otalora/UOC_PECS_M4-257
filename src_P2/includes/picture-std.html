<picture>
  <source
    type="image/webp"
    srcset="
      ./img/{{src}}?as=webp&width=400   400w,
      ./img/{{src}}?as=webp&width=800   800w,
      ./img/{{src}}?as=webp&width=1200 1200w,
      ./img/{{src}}?as=webp&width=1600 1600w,
      ./img/{{src}}?as=webp&width=2400 2400w
    "
    sizes="{{sizes}}"
  />

  <img
    src="./img/{{src}}?width={{width}}"
    alt="{{alt}}"
    lang="{{lang}}"
    class="{{class}}"
    loading="lazy"
    width="{{width}}"
    height="{{height}}"
  />
</picture>
